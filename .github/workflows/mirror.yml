name: Push to mirror

on:
  push:
    branches: ["main"]

jobs:
  mirror:
    name: Prepare and Push Mirror
    runs-on: ubuntu-latest
    if: github.repository == 'Zappy-Epitech/Common'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.COMMON_TOKEN }}

      - name: Prepare Flat Repository
        run: |
          SUBMODULES=$(git submodule status | awk '{print $2}')
          rm -f .gitmodules
          for module in $SUBMODULES; do
            if [ -d "$module" ]; then
              echo "Flattening $module..."
              rm -rf "$module/.git"
            fi
          done
          rm -rf .github
          rm -rf .git

      - name: Push to Mirror
        env:
          MIRROR_URL: ${{ vars.MIRROR_URL }}
          SSH_PRIVATE_KEY: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$MIRROR_URL" ]; then
            echo "Error: MIRROR_URL is not set in variables."
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          HOST=$(echo "$MIRROR_URL" | cut -d'@' -f2 | cut -d':' -f1)
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b main
          
          git add .
          git commit -m "Mirroring Zappy from Common (flattened submodules)"
          
          git remote add mirror "$MIRROR_URL"
          git push mirror main --force || git push mirror main:master --force
